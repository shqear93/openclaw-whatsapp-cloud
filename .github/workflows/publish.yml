name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v1.0.0) -- for re-running a publish that missed its release event"
        required: true

permissions:
  contents: read
  id-token: write # required for npm Trusted Publishing (OIDC) -- no NPM_TOKEN needed

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      # OIDC Trusted Publishing needs npm >= 11.5.1, which in turn needs a
      # newer Node than this package's own Node 20 baseline (npm@latest
      # refuses to install on Node 20 at all: confirmed live, EBADENGINE,
      # "Required: node ^22.22.2 || ^24.15.0 || >=26.0.0"). This bump is a
      # publish-tooling requirement only -- it doesn't change what Node
      # version the package itself targets (see ci.yml / .mise.toml, both
      # still Node 20).
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upgrade npm
        run: npm install -g npm@latest

      # No long-lived NPM_TOKEN secret, and immune to npm's 2026-08/2027-01
      # deprecation of 2FA-bypass tokens for CI publish
      # (https://github.blog/changelog/2026-07-08-npm-install-time-security-and-gat-bypass2fa-deprecation/).
      # Requires the package's Trusted Publisher configured on npmjs.com to
      # point at this repo + this workflow file first.
      - name: Publish
        run: npm publish --access public
